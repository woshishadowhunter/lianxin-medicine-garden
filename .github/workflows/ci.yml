name: CI

on:
  push:
    branches: [main, "agent/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install test tooling
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Check JavaScript syntax
        shell: bash
        run: find miniprogram cloudfunctions scripts -name '*.js' -print0 | xargs -0 -n1 node --check
